<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>QRコードの読み取り</title>
    <script src="https://unpkg.com/html5-qrcode">
    </script>
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:sans-serif;background:#111;color:#fff;min-height:100vh}
      .top{display:flex;justify-content:space-between;padding:12px 16px;background:#222}
      .top h1{font-size:16px}
      .done{background:#e33;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer}
      #res{padding:16px;text-align:center;font-size:18px;font-weight:700;color:#34d399;display:none}
      #qr-reader video{width:100%!important}
      #qr-reader__dashboard button{background:#3b82f6!important;color:#fff!important;border:none!important;border-radius:8px!important;padding:10px 20px!important;cursor:pointer!important}
      select{background:#333!important;color:#fff!important;border:1px solid #555!important;border-radius:6px!important;padding:8px!important}
    </style>
    </head>
  <body>
    <div class="top">
    <h1>QRコードの読み取り</h1>
    <div id="qr-reader"></div>
    <div id="result"></div>
    <script src="scan.js"></script>
  </body>
</html>
